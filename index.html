<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pulse</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:#080c1a;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100dvh;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  touch-action:none;
  user-select:none;
}
.container{
  text-align:center;
  padding:16px;
  max-width:420px;
  width:100%;
}
h1{
  color:#f0d060;
  font-size:22px;
  letter-spacing:4px;
  text-transform:uppercase;
  font-weight:300;
  margin-bottom:2px;
}
.subtitle{
  color:rgba(255,255,255,0.25);
  font-size:12px;
  letter-spacing:1px;
  margin-bottom:8px;
  transition:color 0.3s;
}
.subtitle.active{color:#f0d060}
.stats{
  display:flex;
  justify-content:space-between;
  color:rgba(255,255,255,0.4);
  font-size:13px;
  margin-bottom:6px;
  letter-spacing:1px;
}
.stats span{color:#fff;font-weight:600}
.progress-wrap{
  background:rgba(255,255,255,0.06);
  border-radius:10px;
  height:5px;
  margin-bottom:10px;
  overflow:hidden;
}
.progress-bar{
  height:100%;
  width:0%;
  border-radius:10px;
  background:linear-gradient(90deg,#f0d060,#f5a840);
  transition:width 0.35s ease;
}
canvas{
  display:block;
  margin:0 auto;
  width:100%;
  max-width:340px;
  aspect-ratio:1;
  border-radius:16px;
  background:#0a1025;
  touch-action:none;
  cursor:pointer;
}
.mode-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin:8px auto 0;
}
.switch{
  position:relative;
  width:40px;
  height:22px;
  flex-shrink:0;
}
.switch input{opacity:0;width:0;height:0}
.slider{
  position:absolute;
  cursor:pointer;
  inset:0;
  background:rgba(255,255,255,0.08);
  border-radius:22px;
  transition:0.3s;
}
.slider::before{
  content:'';
  position:absolute;
  height:16px;width:16px;
  left:3px;bottom:3px;
  background:#f0d060;
  border-radius:50%;
  transition:0.3s;
}
.switch input:checked + .slider{background:rgba(240,208,96,0.25)}
.switch input:checked + .slider::before{transform:translateX(18px)}
.mode-label{
  color:rgba(255,255,255,0.15);
  font-size:11px;
  letter-spacing:0.5px;
  transition:color 0.3s;
}
.mode-label.on{color:rgba(240,208,96,0.6)}
.controls{
  display:flex;
  gap:8px;
  margin:10px auto 0;
  justify-content:center;
  flex-wrap:wrap;
}
.controls label{
  color:rgba(255,255,255,0.3);
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:6px;
  background:rgba(255,255,255,0.04);
  padding:4px 10px 4px 12px;
  border-radius:20px;
  position:relative;
}
.controls select{
  background:#0a1025;
  color:#f0d060;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:3px 6px;
  font-size:13px;
  font-weight:600;
  outline:none;
  cursor:pointer;
}
.controls select:focus{border-color:#f0d060}
.controls select option:disabled{color:#555;font-style:italic}
.badge{
  display:none;
  position:absolute;
  top:-4px;
  right:-4px;
  background:#e94560;
  color:#fff;
  font-size:8px;
  font-weight:700;
  width:14px;height:14px;
  border-radius:50%;
  align-items:center;
  justify-content:center;
}
.badge.show{display:flex}
.actions{
  display:flex;
  gap:8px;
  margin:8px auto 0;
  justify-content:center;
}
.actions button{
  background:rgba(240,208,96,0.1);
  color:#f0d060;
  border:1px solid rgba(240,208,96,0.2);
  border-radius:20px;
  padding:6px 16px;
  font-size:12px;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.2s;
}
.actions button:hover{background:rgba(240,208,96,0.2)}
.actions button:active{transform:scale(0.95)}
.actions button:disabled{opacity:0.3;cursor:default}
.actions button:disabled:hover{background:rgba(240,208,96,0.1)}
.hint{
  margin-top:8px;
  color:rgba(255,255,255,0.1);
  font-size:11px;
  letter-spacing:0.5px;
}
</style>
</head>
<body>
<div class="container">
  <h1>Pulse</h1>
  <div class="subtitle" id="subtitle">Remove all pulses</div>
  <div class="stats">
    <div><span id="stat-prefix">Pulses</span> <span id="pulse-count">0</span></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <canvas id="grid"></canvas>
  <div class="mode-row">
    <label class="switch">
      <input type="checkbox" id="mode-switch">
      <span class="slider"></span>
    </label>
    <span class="mode-label" id="mode-label">clear</span>
  </div>
  <div class="controls">
    <label>Grid <select id="size-select"><option value="3" selected>3×3</option><option value="4">4×4</option><option value="5">5×5</option><option value="6">6×6</option></select></label>
    <label>States <select id="state-select"><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option></select><span class="badge" id="unsolvable-badge">!</span></label>
  </div>
  <div class="actions">
    <button id="hint-btn">Hint</button>
    <button id="reset-btn">New</button>
  </div>
  <div class="hint" id="hint-msg">tap a cell — its row and column pulse too</div>
</div>
<script>
const SOLVABLE = {
  '3,3':true,'4,4':true,'4,5':true,'5,5':true,'6,3':true,'6,4':true,'6,6':true
};
function isSolvable(g, s) { return !!SOLVABLE[g+','+s]; }

let GRID = 3;
let STATES = 3;
let CELL = 68;
let grid = [];
let goalMode = 'clear'; // 'clear' or 'fill'
let particles = [];
let ripples = [];
let highlights = [];
let RADII = [];
let COLORS = [];
let busy = false;
let hintCell = null;
let victoryText = '';

function buildColors(n) {
  COLORS.length = 0;
  const stops = [
    [0.08,0.08,0.22],[0.06,0.22,0.50],[0.14,0.40,0.78],
    [0.31,0.66,0.88],[0.94,0.82,0.38],[0.98,0.72,0.25]
  ];
  for (let i = 0; i < n; i++) {
    const t = i / (n - 1 || 1);
    const idx = t * (stops.length - 1);
    const a = Math.floor(idx), b = Math.min(a + 1, stops.length - 1), f = idx - a;
    COLORS.push(`rgb(${Math.round((stops[a][0]+(stops[b][0]-stops[a][0])*f)*255)},${Math.round((stops[a][1]+(stops[b][1]-stops[a][1])*f)*255)},${Math.round((stops[a][2]+(stops[b][2]-stops[a][2])*f)*255)})`);
  }
}

const canvas = document.getElementById('grid');
const ctx = canvas.getContext('2d');

function setMode(mode) {
  goalMode = mode;
  document.getElementById('mode-switch').checked = mode === 'fill';
  document.getElementById('mode-label').textContent = mode === 'clear' ? 'clear' : 'fill';
  document.getElementById('mode-label').className = 'mode-label' + (mode === 'fill' ? ' on' : '');
  document.getElementById('subtitle').textContent = mode === 'clear' ? 'Remove all pulses' : 'Fill the grid with pulse';
  document.getElementById('subtitle').className = 'subtitle' + (mode === 'fill' ? ' active' : '');
  updateUI();
}

function setup() {
  GRID = parseInt(document.getElementById('size-select').value);
  STATES = parseInt(document.getElementById('state-select').value);
  CELL = Math.min(68, Math.floor(320 / GRID));
  const cw = GRID * CELL + 20;
  canvas.width = cw; canvas.height = cw;
  buildColors(STATES);
  RADII = [];
  for (let i = 1; i <= STATES; i++)
    RADII.push(Math.max(3, (CELL / 2 - 4) * (i / STATES)));
  hintCell = null;
  const solvable = isSolvable(GRID, STATES);
  document.getElementById('unsolvable-badge').classList.toggle('show', !solvable);
  document.getElementById('hint-msg').textContent = solvable
    ? 'tap a cell — its row and column pulse too'
    : 'not solvable for this combo — try another';
  document.getElementById('hint-btn').disabled = !solvable;
  document.getElementById('hint-btn').style.opacity = solvable ? 1 : 0.3;
  init();
  updateUI();
}

function init() {
  const N = GRID, mod = STATES;
  do {
    grid = [];
    for (let r = 0; r < N; r++) {
      grid[r] = [];
      for (let c = 0; c < N; c++)
        grid[r][c] = Math.floor(Math.random() * mod) + 1;
    }
    const maxCount = grid.flat().filter(v => v === mod).length;
    if (maxCount >= 2 && maxCount <= N * N - 2) break;
  } while (true);
}

function tap(r, c) {
  if (busy) return;
  grid[r][c] = (grid[r][c] % STATES) + 1;
  for (let i = 0; i < GRID; i++) {
    if (i !== c) grid[r][i] = (grid[r][i] % STATES) + 1;
    if (i !== r) grid[i][c] = (grid[i][c] % STATES) + 1;
  }
  ripples.push({x:c,y:r,t:performance.now(),duration:400});
  highlights.push({r,c,t:performance.now()});
  scatter(r, c, 4, COLORS[STATES-1]);
  hintCell = null;
  updateUI();
}

function updateUI() {
  const total = GRID * GRID;
  const pulses = grid.flat().filter(v => v === STATES).length;
  const won = goalMode === 'clear' ? pulses === 0 : pulses === total;
  document.getElementById('stat-prefix').textContent = goalMode === 'clear' ? 'Pulses' : 'Pulsed';
  document.getElementById('pulse-count').textContent = goalMode === 'clear' ? pulses : pulses + '/' + total;
  const pct = goalMode === 'clear' ? (total - pulses) / total * 100 : pulses / total * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  if (!won || busy) return;
  busy = true;
  victoryText = goalMode === 'clear' ? '✨ CLEAR! ✨' : '✨ PULSE! ✨';
  let delay = 0;
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      const row = r, col = c;
      setTimeout(() => {
        scatter(row, col, 20, `hsl(${40+Math.random()*20},95%,${60+Math.random()*25}%)`);
        ripples.push({x:col,y:row,t:performance.now(),duration:500});
      }, delay);
      delay += 30;
    }
  }
  document.getElementById('hint-msg').textContent = 'tap anywhere on the grid to continue';
}

function modInv(a, m) {
  a = ((a % m) + m) % m;
  let g = a, x = 1, y = 0, m0 = m;
  while (a > 1) {
    let q = Math.floor(a / m);
    let t = m; m = a % m; a = t;
    t = y; y = x - q * y; x = t;
  }
  return ((x % m0) + m0) % m0;
}

function solveGrid(target) {
  const N = GRID, M = N * N, mod = STATES;
  const mat = [], rhs = [];
  for (let p = 0; p < N; p++) {
    for (let q = 0; q < N; q++) {
      const row = [];
      for (let i = 0; i < N; i++)
        for (let j = 0; j < N; j++)
          row.push((i === p || j === q) ? 1 : 0);
      mat.push(row);
      const cur = (grid[p][q] - 1 + mod) % mod;
      const tgt = (target - 1 + mod) % mod;
      rhs.push((tgt - cur + mod) % mod);
    }
  }
  const aug = mat.map((r, i) => [...r, rhs[i]]);
  let rank = 0;
  for (let col = 0; col < M && rank < M; col++) {
    let pivot = -1;
    for (let r = rank; r < M; r++) {
      if (aug[r][col] % mod !== 0) { pivot = r; break; }
    }
    if (pivot === -1) continue;
    [aug[rank], aug[pivot]] = [aug[pivot], aug[rank]];
    const inv = modInv(aug[rank][col], mod);
    for (let j = col; j <= M; j++) aug[rank][j] = (aug[rank][j] * inv) % mod;
    for (let r = 0; r < M; r++) {
      if (r !== rank && aug[r][col] !== 0) {
        const factor = aug[r][col];
        for (let j = col; j <= M; j++)
          aug[r][j] = (aug[r][j] - factor * aug[rank][j] + mod) % mod;
      }
    }
    rank++;
  }
  return aug.map(r => ((r[M] % mod) + mod) % mod);
}

function getSuggestion() {
  const N = GRID, mod = STATES;
  const target = goalMode === 'clear' ? 1 : mod;
  let sol;
  try { sol = solveGrid(target); } catch(e) { return null; }
  let best = null, bestScore = -Infinity;
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      const t = sol[r * N + c];
      if (t === 0) continue;
      const after = grid.map(row => [...row]);
      after[r][c] = (after[r][c] % mod) + 1;
      for (let i = 0; i < N; i++) {
        if (i !== c) after[r][i] = (after[r][i] % mod) + 1;
        if (i !== r) after[i][c] = (after[i][c] % mod) + 1;
      }
      const before = grid.flat().filter(v => v === mod).length;
      const afterP = after.flat().filter(v => v === mod).length;
      const delta = before - afterP;
      const score = goalMode === 'clear' ? delta : -delta;
      if (score > bestScore) { bestScore = score; best = {r,c}; }
    }
  }
  return best;
}

function scatter(r, c, n, color) {
  const PAD = 10;
  const cx = PAD + c * CELL + CELL / 2;
  const cy = PAD + r * CELL + CELL / 2;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 50 + Math.random() * 140;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,size:2+Math.random()*3,color,gy:50});
  }
}

function render(now) {
  const PAD = 10;
  const cw = canvas.width;
  ctx.clearRect(0, 0, cw, cw);
  ctx.fillStyle = '#0a1025';
  ctx.fillRect(2, 2, cw - 4, cw - 4);

  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      const cx = PAD + c * CELL + CELL / 2;
      const cy = PAD + r * CELL + CELL / 2;
      const v = grid[r][c];
      const rad = RADII[v - 1];
      const isPulse = v === STATES;

      let flash = 0;
      for (const h of highlights) {
        const dt = now - h.t;
        if (dt > 350) continue;
        if (r === h.r || c === h.c) flash = Math.max(flash, 1 - dt / 350);
      }

      const isHint = hintCell && hintCell.r === r && hintCell.c === c;

      if (isPulse) {
        const pulse = 1 + Math.sin(now / 300 + r * 2.3 + c * 2.7) * 0.1;
        const ext = isHint ? 1.5 : 0;
        const g = ctx.createRadialGradient(cx, cy, rad * 0.4, cx, cy, rad * (2.4 + ext) * pulse);
        g.addColorStop(0, `rgba(240,208,96,${0.25+flash*0.2+(isHint?0.3:0)})`);
        g.addColorStop(0.5, `rgba(240,208,96,${0.06+flash*0.1+(isHint?0.15:0)})`);
        g.addColorStop(1, 'rgba(240,208,96,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, rad * (2.4 + ext) * pulse, 0, Math.PI * 2);
        ctx.fill();
      }

      if (isHint && !isPulse) {
        ctx.strokeStyle = `rgba(240,208,96,${0.3+Math.sin(now/200)*0.2})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, rad + 6, 0, Math.PI * 2);
        ctx.stroke();
      }
      if (isHint && isPulse) {
        ctx.strokeStyle = `rgba(240,208,96,${0.5+Math.sin(now/200)*0.3})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, cy, rad + 9, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.fillStyle = flash > 0
        ? `rgba(240,208,96,${Math.min(1, flash * 0.3 + 0.7)})`
        : COLORS[v - 1];
      ctx.beginPath();
      ctx.arc(cx, cy, rad, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx, cy, rad + 2, 0, Math.PI * 2);
      ctx.stroke();

      if (isPulse) {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = 'bold 12px sans-serif';
      } else {
        ctx.fillStyle = `rgba(255,255,255,${0.06 + v * 0.04})`;
        ctx.font = '10px sans-serif';
      }
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(isPulse ? '✦' : v, cx, cy + (isPulse ? 0.5 : 1));
    }
  }

  // Victory text
  if (victoryText) {
    const alpha = 0.7 + Math.sin(now / 200) * 0.3;
    ctx.fillStyle = `rgba(240,208,96,${alpha})`;
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(240,208,96,0.3)';
    ctx.shadowBlur = 20;
    ctx.fillText(victoryText, cw / 2, cw / 2);
    ctx.shadowBlur = 0;
  }

  // Ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    const w = ripples[i];
    const dt = now - w.t;
    if (dt > w.duration) { ripples.splice(i, 1); continue; }
    const p = dt / w.duration;
    const radius = 8 + p * CELL * 1.6;
    const cx = PAD + w.x * CELL + CELL / 2;
    const cy = PAD + w.y * CELL + CELL / 2;
    ctx.strokeStyle = `rgba(240,208,96,${(1-p)*0.35})`;
    ctx.lineWidth = 2.5 * (1 - p) + 0.5;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * 0.016;
    p.y += p.vy * 0.016;
    p.vy += p.gy * 0.016;
    p.life -= 0.02;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (0.3 + 0.7 * p.life), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  highlights = highlights.filter(h => now - h.t < 350);
  requestAnimationFrame(render);
}

function getCell(e) {
  const PAD = 10;
  const rect = canvas.getBoundingClientRect();
  const s = canvas.width / rect.width;
  const ex = e.touches ? e.touches[0].clientX : e.clientX;
  const ey = e.touches ? e.touches[0].clientY : e.clientY;
  const mx = (ex - rect.left) * s;
  const my = (ey - rect.top) * s;
  if (mx < PAD || mx > PAD + GRID * CELL || my < PAD || my > PAD + GRID * CELL) return null;
  return {r:Math.floor((my-PAD)/CELL),c:Math.floor((mx-PAD)/CELL)};
}

function resetAfterVictory() {
  if (!busy || !victoryText) return;
  victoryText = '';
  busy = false;
  hintCell = null;
  init();
  updateUI();
  document.getElementById('hint-msg').textContent = 'tap a cell — its row and column pulse too';
}

canvas.addEventListener('touchstart', e => { e.preventDefault();
  if (victoryText) { resetAfterVictory(); return; }
  if (!busy) { const cell = getCell(e); if (cell) tap(cell.r, cell.c); }
});
canvas.addEventListener('mousedown', e => {
  if (victoryText) { resetAfterVictory(); return; }
  if (!busy) { const cell = getCell(e); if (cell) tap(cell.r, cell.c); }
});

document.getElementById('mode-switch').addEventListener('change', function() {
  setMode(this.checked ? 'fill' : 'clear');
  if (victoryText) {
    victoryText = '';
    busy = false;
    hintCell = null;
    init();
    updateUI();
    document.getElementById('hint-msg').textContent = 'tap a cell — its row and column pulse too';
  }
});

document.getElementById('hint-btn').addEventListener('click', () => {
  if (!isSolvable(GRID, STATES) || victoryText) return;
  const s = getSuggestion();
  if (s) { hintCell = s;
    document.getElementById('hint-msg').textContent =
      `💡 tap (${s.r+1}, ${s.c+1})`;
  }
});
document.getElementById('reset-btn').addEventListener('click', () => {
  victoryText = ''; busy = false; hintCell = null; init(); updateUI();
  document.getElementById('hint-msg').textContent = 'tap a cell — its row and column pulse too';
});
document.getElementById('size-select').addEventListener('change', () => {
  const g = parseInt(document.getElementById('size-select').value);
  const maxValid = {3:3,4:5,5:5,6:6}[g]||3;
  const sel = document.getElementById('state-select');
  if (parseInt(sel.value) > maxValid || !isSolvable(g, parseInt(sel.value)))
    sel.value = maxValid;
  setup();
});
document.getElementById('state-select').addEventListener('change', () => {
  const s = parseInt(document.getElementById('state-select').value);
  const sel = document.getElementById('size-select');
  if (!isSolvable(parseInt(sel.value), s)) {
    const valid = [];
    for (let g = 3; g <= 6; g++) if (isSolvable(g, s)) valid.push(g);
    if (valid.length) sel.value = valid[0];
  }
  setup();
});

setMode('fill');
setup();
requestAnimationFrame(render);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pulse</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:#080c1a;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100dvh;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  touch-action:none;
  user-select:none;
}
.container{
  text-align:center;
  padding:16px;
  max-width:420px;
  width:100%;
}
h1{
  color:#f0d060;
  font-size:22px;
  letter-spacing:4px;
  text-transform:uppercase;
  font-weight:300;
  margin-bottom:8px;
}
.stats{
  display:flex;
  justify-content:space-between;
  color:rgba(255,255,255,0.4);
  font-size:13px;
  margin-bottom:6px;
  letter-spacing:1px;
}
.stats span{color:#fff;font-weight:600}
.progress-wrap{
  background:rgba(255,255,255,0.06);
  border-radius:10px;
  height:5px;
  margin-bottom:10px;
  overflow:hidden;
}
.progress-bar{
  height:100%;
  width:0%;
  border-radius:10px;
  background:linear-gradient(90deg,#f0d060,#f5a840);
  transition:width 0.35s ease;
}
canvas{
  display:block;
  margin:0 auto;
  width:100%;
  max-width:340px;
  aspect-ratio:1;
  border-radius:16px;
  background:#0a1025;
  touch-action:none;
  cursor:pointer;
}
.controls{
  display:flex;
  gap:8px;
  margin:10px auto 0;
  justify-content:center;
  flex-wrap:wrap;
}
.controls label{
  color:rgba(255,255,255,0.3);
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:6px;
  background:rgba(255,255,255,0.04);
  padding:4px 10px 4px 12px;
  border-radius:20px;
  position:relative;
}
.controls select{
  background:#0a1025;
  color:#f0d060;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:3px 6px;
  font-size:13px;
  font-weight:600;
  outline:none;
  cursor:pointer;
}
.controls select:focus{border-color:#f0d060}
.controls select option:disabled{color:#555;font-style:italic}
.badge{
  display:none;
  position:absolute;
  top:-4px;
  right:-4px;
  background:#e94560;
  color:#fff;
  font-size:8px;
  font-weight:700;
  width:14px;height:14px;
  border-radius:50%;
  align-items:center;
  justify-content:center;
}
.badge.show{display:flex}
.actions{
  display:flex;
  gap:8px;
  margin:8px auto 0;
  justify-content:center;
}
.actions button{
  background:rgba(240,208,96,0.1);
  color:#f0d060;
  border:1px solid rgba(240,208,96,0.2);
  border-radius:20px;
  padding:6px 16px;
  font-size:12px;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.2s;
}
.actions button:hover{background:rgba(240,208,96,0.2)}
.actions button:active{transform:scale(0.95)}
.hint{
  margin-top:8px;
  color:rgba(255,255,255,0.1);
  font-size:11px;
  letter-spacing:0.5px;
}
</style>
</head>
<body>
<div class="container">
  <h1>Pulse</h1>
  <div class="stats">
    <div>Pulsed <span id="align-count">0</span>/<span id="cell-total">9</span></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <canvas id="grid"></canvas>
  <div class="controls">
    <label>Grid <select id="size-select"><option value="3" selected>3×3</option><option value="4">4×4</option><option value="5">5×5</option><option value="6">6×6</option></select></label>
    <label>States <select id="state-select"><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option></select><span class="badge" id="unsolvable-badge">!</span></label>
  </div>
  <div class="actions">
    <button id="hint-btn">Hint</button>
    <button id="reset-btn">New</button>
  </div>
  <div class="hint" id="hint-msg">tap a cell — its row and column pulse too</div>
</div>
<script>
let GRID = 3;
let STATES = 3;
let CELL = 68;

const canvas = document.getElementById('grid');
const ctx = canvas.getContext('2d');
const COLORS = [];
let grid = [];
let busy = false;
let particles = [];
let ripples = [];
let highlights = [];
let RADII = [];
let hintCell = null;

// ---- Solvabilite ----
const SOLVABLE = {
  '3,3':true,'4,4':true,'4,5':true,'5,5':true,'6,3':true,'6,4':true,'6,6':true
};
function isSolvable(g, s) { return !!SOLVABLE[g+','+s]; }

// ---- Solveur lineaire modulaire ----
function modInv(a, m) {
  a = ((a % m) + m) % m;
  let g = a, x = 1, y = 0, m0 = m;
  while (a > 1) {
    let q = Math.floor(a / m);
    let t = m; m = a % m; a = t;
    t = y; y = x - q * y; x = t;
  }
  return ((x % m0) + m0) % m0;
}

function solveGrid() {
  const N = GRID;
  const M = N * N;
  const mod = STATES;
  // Build matrix (M x M)
  const mat = [];
  const rhs = [];
  for (let p = 0; p < N; p++) {
    for (let q = 0; q < N; q++) {
      const row = [];
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          let val = 0;
          if (i === p || j === q) val = 1;
          row.push(val % mod);
        }
      }
      mat.push(row);
      let target = (mod - grid[p][q] + mod) % mod;
      rhs.push(target % mod);
    }
  }

  // Gaussian elimination over Z_mod
  const aug = mat.map((r, i) => [...r, rhs[i]]);
  let rank = 0;
  for (let col = 0; col < M && rank < M; col++) {
    let pivot = -1;
    for (let r = rank; r < M; r++) {
      if (aug[r][col] % mod !== 0) { pivot = r; break; }
    }
    if (pivot === -1) continue;
    [aug[rank], aug[pivot]] = [aug[pivot], aug[rank]];
    const inv = modInv(aug[rank][col], mod);
    for (let j = col; j <= M; j++) aug[rank][j] = (aug[rank][j] * inv) % mod;
    for (let r = 0; r < M; r++) {
      if (r !== rank && aug[r][col] !== 0) {
        const factor = aug[r][col];
        for (let j = col; j <= M; j++)
          aug[r][j] = (aug[r][j] - factor * aug[rank][j] + mod) % mod;
      }
    }
    rank++;
  }

  const sol = aug.map(r => ((r[M] % mod) + mod) % mod);
  return sol;
}

function getSuggestion() {
  const N = GRID;
  const mod = STATES;
  const sol = solveGrid();
  const solMat = [];
  for (let r = 0; r < N; r++) {
    solMat[r] = [];
    for (let c = 0; c < N; c++) solMat[r][c] = sol[r * N + c];
  }
  // Find cells where sol[r][c] != 0
  let best = null;
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      if (solMat[r][c] !== 0) best = { r, c };
  return best;
}

// ---- Build colors ----
function buildColors(n) {
  COLORS.length = 0;
  const stops = [
    [0.08, 0.08, 0.22],
    [0.06, 0.22, 0.50],
    [0.14, 0.40, 0.78],
    [0.31, 0.66, 0.88],
    [0.94, 0.82, 0.38],
    [0.98, 0.72, 0.25]
  ];
  for (let i = 0; i < n; i++) {
    const t = i / (n - 1 || 1);
    const idx = t * (stops.length - 1);
    const a = Math.floor(idx);
    const b = Math.min(a + 1, stops.length - 1);
    const f = idx - a;
    const r = Math.round((stops[a][0] + (stops[b][0]-stops[a][0])*f)*255);
    const g = Math.round((stops[a][1] + (stops[b][1]-stops[a][1])*f)*255);
    const bl = Math.round((stops[a][2] + (stops[b][2]-stops[a][2])*f)*255);
    COLORS.push(`rgb(${r},${g},${bl})`);
  }
}

// ---- Setup ----
function setup() {
  GRID = parseInt(document.getElementById('size-select').value);
  STATES = parseInt(document.getElementById('state-select').value);
  CELL = Math.min(68, Math.floor(320 / GRID));
  const cw = GRID * CELL + 20;
  canvas.width = cw;
  canvas.height = cw;
  document.getElementById('cell-total').textContent = GRID * GRID;
  buildColors(STATES);
  RADII = [];
  for (let i = 1; i <= STATES; i++)
    RADII.push(Math.max(4, (CELL / 2 - 4) * (i / STATES)));
  hintCell = null;

  const solvable = isSolvable(GRID, STATES);
  const badge = document.getElementById('unsolvable-badge');
  badge.classList.toggle('show', !solvable);
  document.getElementById('hint-msg').textContent = solvable
    ? 'solvable! use Hint if stuck'
    : '⚠️ this combination is not generally solvable — try another';

  document.getElementById('hint-btn').disabled = !solvable;
  document.getElementById('hint-btn').style.opacity = solvable ? 1 : 0.3;

  init();
  checkPulse();
}

function init() {
  const N = GRID; const mod = STATES;
  let attempts = 0;
  do {
    grid = [];
    for (let r = 0; r < N; r++) {
      grid[r] = [];
      for (let c = 0; c < N; c++)
        grid[r][c] = Math.floor(Math.random() * mod) + 1;
    }
    attempts++;
    if (!isSolvable(N, mod)) break;
  } while (attempts < 50 && !isSolvableGrid());
}

function isSolvableGrid() {
  if (!isSolvable(GRID, STATES)) return true;
  try {
    const sol = solveGrid();
    return sol.every(v => !isNaN(v));
  } catch(e) { return false; }
}

// ---- Gameplay ----
function tap(r, c) {
  if (busy) return;
  grid[r][c] = (grid[r][c] % STATES) + 1;
  for (let i = 0; i < GRID; i++) {
    if (i !== c) grid[r][i] = (grid[r][i] % STATES) + 1;
    if (i !== r) grid[i][c] = (grid[i][c] % STATES) + 1;
  }
  ripples.push({x:c,y:r,t:performance.now(),duration:400});
  highlights.push({r,c,t:performance.now()});
  scatter(r, c, 6, COLORS[STATES-1]);
  hintCell = null;
  checkPulse();
}

function checkPulse() {
  let n = 0;
  const total = GRID * GRID;
  for (let r = 0; r < GRID; r++)
    for (let c = 0; c < GRID; c++)
      if (grid[r][c] === STATES) n++;
  document.getElementById('align-count').textContent = n;
  document.getElementById('progress-bar').style.width = (n / total * 100) + '%';
  if (n < total) return;
  busy = true;
  let delay = 0;
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      const row = r, col = c;
      setTimeout(() => {
        scatter(row, col, 16, `hsl(${40+Math.random()*20},95%,${60+Math.random()*25}%)`);
        ripples.push({x:col,y:row,t:performance.now(),duration:500});
      }, delay);
      delay += 30;
    }
  }
  setTimeout(() => {
    init();
    busy = false;
    checkPulse();
  }, delay + 500);
}

function scatter(r, c, n, color) {
  const PAD = 10;
  const cx = PAD + c * CELL + CELL / 2;
  const cy = PAD + r * CELL + CELL / 2;
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 50 + Math.random() * 140;
    particles.push({
      x:cx, y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, size:2+Math.random()*3, color, gy:50
    });
  }
}

// ---- Render ----
function render(now) {
  const PAD = 10;
  const cw = canvas.width;
  ctx.clearRect(0, 0, cw, cw);
  ctx.fillStyle = '#0a1025';
  ctx.fillRect(2, 2, cw - 4, cw - 4);

  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      const cx = PAD + c * CELL + CELL / 2;
      const cy = PAD + r * CELL + CELL / 2;
      const v = grid[r][c];
      const rad = RADII[v - 1];

      let flash = 0;
      for (const h of highlights) {
        const dt = now - h.t;
        if (dt > 350) continue;
        if (r === h.r || c === h.c) flash = Math.max(flash, 1 - dt / 350);
      }

      const isHint = hintCell && hintCell.r === r && hintCell.c === c;

      if (v === STATES) {
        const pulse = 1 + Math.sin(now / 300 + r * 2.3 + c * 2.7) * 0.1;
        const g = ctx.createRadialGradient(cx, cy, rad * 0.4, cx, cy, rad * (2.4 + (isHint?1.5:0)) * pulse);
        g.addColorStop(0, `rgba(240,208,96,${0.25+flash*0.2+(isHint?0.3:0)})`);
        g.addColorStop(0.5, `rgba(240,208,96,${0.06+flash*0.1+(isHint?0.15:0)})`);
        g.addColorStop(1, 'rgba(240,208,96,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, rad * (2.4 + (isHint?1.5:0)) * pulse, 0, Math.PI * 2);
        ctx.fill();
      }

      if (isHint) {
        ctx.strokeStyle = `rgba(240,208,96,${0.4+Math.sin(now/200)*0.3})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, cy, rad + 8, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.fillStyle = flash > 0
        ? `rgba(240,208,96,${Math.min(1, flash * 0.3 + 0.7)})`
        : COLORS[v - 1];
      ctx.beginPath();
      ctx.arc(cx, cy, rad, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx, cy, rad + 2, 0, Math.PI * 2);
      ctx.stroke();

      if (v < STATES) {
        ctx.fillStyle = `rgba(255,255,255,${0.06 + v * 0.04})`;
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(v, cx, cy + 1);
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('✦', cx, cy + 0.5);
      }
    }
  }

  for (let i = ripples.length - 1; i >= 0; i--) {
    const w = ripples[i];
    const dt = now - w.t;
    if (dt > w.duration) { ripples.splice(i, 1); continue; }
    const p = dt / w.duration;
    const radius = 8 + p * CELL * 1.6;
    const cx = PAD + w.x * CELL + CELL / 2;
    const cy = PAD + w.y * CELL + CELL / 2;
    ctx.strokeStyle = `rgba(240,208,96,${(1-p)*0.35})`;
    ctx.lineWidth = 2.5 * (1 - p) + 0.5;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.stroke();
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * 0.016;
    p.y += p.vy * 0.016;
    p.vy += p.gy * 0.016;
    p.life -= 0.02;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (0.3 + 0.7 * p.life), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  highlights = highlights.filter(h => now - h.t < 350);
  requestAnimationFrame(render);
}

// ---- Input ----
function getCell(e) {
  const PAD = 10;
  const rect = canvas.getBoundingClientRect();
  const s = canvas.width / rect.width;
  const ex = e.touches ? e.touches[0].clientX : e.clientX;
  const ey = e.touches ? e.touches[0].clientY : e.clientY;
  const mx = (ex - rect.left) * s;
  const my = (ey - rect.top) * s;
  if (mx < PAD || mx > PAD + GRID * CELL || my < PAD || my > PAD + GRID * CELL) return null;
  return {r:Math.floor((my-PAD)/CELL),c:Math.floor((mx-PAD)/CELL)};
}

canvas.addEventListener('touchstart', e => { e.preventDefault();
  if (!busy) { const cell = getCell(e); if (cell) tap(cell.r, cell.c); }
});
canvas.addEventListener('mousedown', e => {
  if (!busy) { const cell = getCell(e); if (cell) tap(cell.r, cell.c); }
});

// ---- Controls ----
document.getElementById('hint-btn').addEventListener('click', () => {
  if (!isSolvable(GRID, STATES)) return;
  const s = getSuggestion();
  if (s) {
    hintCell = s;
    document.getElementById('hint-msg').textContent =
      `💡 suggestion: tap the highlighted cell (row ${s.r+1}, col ${s.c+1})`;
  }
});

document.getElementById('reset-btn').addEventListener('click', () => {
  hintCell = null;
  init();
  checkPulse();
});

document.getElementById('size-select').addEventListener('change', () => {
  const g = parseInt(document.getElementById('size-select').value);
  const maxValid = {3:3, 4:5, 5:5, 6:6}[g] || 3;
  const stateSel = document.getElementById('state-select');
  if (parseInt(stateSel.value) > maxValid || !isSolvable(g, parseInt(stateSel.value)))
    stateSel.value = maxValid;
  setup();
});
document.getElementById('state-select').addEventListener('change', () => {
  const s = parseInt(document.getElementById('state-select').value);
  const sizeSel = document.getElementById('size-select');
  if (!isSolvable(parseInt(sizeSel.value), s)) {
    const validSizes = [];
    for (let g = 3; g <= 6; g++) if (isSolvable(g, s)) validSizes.push(g);
    if (validSizes.length) sizeSel.value = validSizes[0];
  }
  setup();
});

// ---- Start ----
setup();
requestAnimationFrame(render);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
